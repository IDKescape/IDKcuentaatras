<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Imagen 1200x800</title>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .contenedor {
      width: 1200px;
      height: 800px;
      overflow: hidden;
    }
    .contenedor img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <img src="IMG_9262.jpg" alt="imagen">
  </div>
</body>
</html>
